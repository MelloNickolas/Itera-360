<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calcule seu IMC</title>
  <link rel="stylesheet" href="./style.css">
</head>


<body>
  <form onsubmit="calcularIMC(event)">
    <div>
      <label for="peso">Digite seu peso em KG: </label>
      <input type="text" placeholder="Ex: 87,5" id="peso">
    </div>
    <div>
      <label for="altura">Digite sua altura em CMs </label>
      <input type="number" placeholder="Ex: 198" id="altura">
    </div>
    <button type="submit">Calcular</button>
    <h1 id="classificacao"></h1>
  </form>



  <script src="./script.js"></script>
</body>

</html>
