<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout 2 Colunas - Grid</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <main class="container">
    <!-- Coluna 1: Lista -->
    <section class="coluna">
      <h1>Lista de Itens</h1>
      <ul class="lista">
        <li>Item 01</li>
        <li>Item 02</li>
        <li>Item 03</li>
        <li>Item 04</li>
        <li>Item 05</li>
      </ul>
    </section>

    <!-- Coluna 2: Formulário -->
    <section class="coluna">
      <h1>Formulário</h1>
      <form class="form" action="#" method="post">
        <label class="sr-only" for="nome">Digite algo</label>
        <input id="nome" name="nome" type="text" placeholder="Digite aqui..." />
        <button type="submit">Enviar</button>
      </form>
    </section>
  </main>

</body>
</html>
